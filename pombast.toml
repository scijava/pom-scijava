[common]
default-java-version = 8
repositories = ["scijava.public=https://maven.scijava.org/content/groups/public"]

[status]
output = "../status.scijava.org/index.html"
smelt = "../status.scijava.org/smelt.json"
rules = "rules.xml"
header = "pombast/header-status.html"
footer = "pombast/footer-status.html"
nexus-base = "https://maven.scijava.org"
cuttable = [
  "de.nanoimaging:*",
  "flimlib:*",
  "fr.inra.ijpb:*",
  "io.scif:*",
  "jitk:*",
  "mpicbg:*",
  "net.imagej:*",
  "net.imglib2:*",
  "net.preibisch:*",
  "org.bonej:*",
  "org.janelia*:*",
  "org.morphonets:*",
  "org.scijava:*",
  "sc.fiji:*",
]

[team]
output = "../status.scijava.org/team.html"
header = "pombast/header-team.html"
footer = "pombast/footer-team.html"
includes = [
  "de.nanoimaging:*",
  "flimlib:*",
  "fr.inra.ijpb:*",
  "io.scif:*",
  "jitk:*",
  "mpicbg:*",
  "net.imagej:*",
  "net.imglib2:*",
  "net.preibisch:*",
  "org.bonej:*",
  "org.janelia*:*",
  "org.morphonets:*",
  "org.scijava:*",
  "sc.fiji:*",
]

[badges]
output = "../status.scijava.org/badges.json"
includes = [
  "de.nanoimaging:*",
  "flimlib:*",
  "fr.inra.ijpb:*",
  "io.scif:*",
  "jitk:*",
  "mpicbg:*",
  "net.imagej:*",
  "net.imglib2:*",
  "net.preibisch:*",
  "ome:*",
  "org.bonej:*",
  "org.janelia*:*",
  "org.morphonets:*",
  "org.openmicroscopy:*",
  "org.scijava:*",
  "sc.fiji:*",
]

[melt]
# Some managed components require Java 21+, so we melt with that Java
# version. But pom-scijava sets scijava.jvm.version to 11 by default.
# So beyond just using OpenJDK 21 to run Maven, we also need to set the
# scijava.jvm.version property to target the right bytecode version.
# Otherwise, the enforcer complains about any Java libraries targeting >11.
java-version = 21
properties = { "scijava.jvm.version" = "21" }

template = "pombast/melt-template.xml"
excludes = [
  # TEMP: Exclude org.bytedeco:hdf5 until cisd:jhdf5 is gone.
  "org.bytedeco:hdf5",
  # NB: The following artifacts have messy dependency trees.
  # Too many problems to test as part of the melt action.
  # See WARNING block in pom-scijava's pom.xml for details.
  "net.imagej:imagej-server",
  "org.apache.spark:spark-core_2.11",
  # NB: Skip alternate flavors of other managed components.
  "org.jogamp.gluegen:gluegen",     # uberjar flavor of gluegen-rt
  "org.jogamp.jogl:jogl-all-noawt", # slimmed down flavor of jogl-all
  # NB: All the SWT platform JARs have the same classes.
  # The current platform will be brought in transitively.
  "org.eclipse.swt:org.eclipse.swt.cocoa.macosx",
  "org.eclipse.swt:org.eclipse.swt.cocoa.macosx.x86_64",
  "org.eclipse.swt:org.eclipse.swt.gtk.aix.ppc",
  "org.eclipse.swt:org.eclipse.swt.gtk.aix.ppc64",
  "org.eclipse.swt:org.eclipse.swt.gtk.hpux.ia64",
  "org.eclipse.swt:org.eclipse.swt.gtk.linux.ppc",
  "org.eclipse.swt:org.eclipse.swt.gtk.linux.ppc64",
  "org.eclipse.swt:org.eclipse.swt.gtk.linux.s390",
  "org.eclipse.swt:org.eclipse.swt.gtk.linux.s390x",
  "org.eclipse.swt:org.eclipse.swt.gtk.linux.x86",
  "org.eclipse.swt:org.eclipse.swt.gtk.linux.x86_64",
  "org.eclipse.swt:org.eclipse.swt.gtk.solaris.sparc",
  "org.eclipse.swt:org.eclipse.swt.gtk.solaris.x86",
  "org.eclipse.swt:org.eclipse.swt.win32.win32.x86",
  "org.eclipse.swt:org.eclipse.swt.win32.win32.x86_64",
  # NB: All SLF4J bindings have the same classes.
  # We'll rely on logback-classic being present here.
  "org.slf4j:slf4j-jcl",
  "org.slf4j:slf4j-jdk14",
  "org.slf4j:slf4j-nop",
  "org.slf4j:slf4j-simple",
  # NB: Cannot include both commons-logging and jcl-over-slf4j;
  # see: http://www.slf4j.org/codes.html#jclDelegationLoop
  "org.slf4j:jcl-over-slf4j",
]

[smelt]
output = "../status.scijava.org/smelt.json"
includes = [
  "de.nanoimaging:*",
  "flimlib:*",
  "fr.inra.ijpb:*",
  "io.scif:*",
  "jitk:*",
  "mpicbg:*",
  "net.imagej:*",
  "net.imglib2:*",
  "net.preibisch:*",
  "org.bonej:*",
  "org.janelia*:*",
  "org.morphonets:*",
  "org.scijava:*",
  "sc.fiji:*",
]
excludes = [
  # NB: Skip closed-source artifacts.
  "org.bonej:bonej-plus",
  # NB: Skip scijava forks of third-party projects.
  # These are very stable, with few/no dependencies, and
  # don't need to be retested as pom-scijava evolves.
  "org.scijava:j3dcore",
  "org.scijava:j3dutils",
  "org.scijava:jep",
  "org.scijava:junit-benchmarks",
  "org.scijava:vecmath",
]
skip-tests = [
    # Error while checking the CLIJ2 installation: null
    "sc.fiji:labkit-pixel-classification",
]

[remove-tests]

# CachedOpEnvironmentTest fails intermittently. Of course, it should be
# somehow fixed in imagej-ops. But for now, let's not let it ruin the smelt.
"net.imagej:imagej-ops" = ["net.imagej.ops.cached.CachedOpEnvironmentTest"]

# In org.janelia.saalfeldlab.n5.metadata.ome.ngff.v04.WriteAxesTests.testXYT:
# java.util.NoSuchElementException: No value present
#"org.janelia.saalfeldlab:n5-ij" = ["org.janelia.saalfeldlab.n5.metadata.ome.ngff.v04.WriteAxesTests"]

# In org.janelia.saalfeldlab.n5.s3.AmazonS3UtilsTest.testUriParsing:
# SdkClient Unable to load region from any of the providers in the chain
# software.amazon.awssdk.regions.providers.DefaultAwsRegionProviderChain@427475a2:
# [software.amazon.awssdk.regions.providers.SystemSettingsRegionProvider@768b79db:
# Unable to load region from system settings. Region must be specified either
# via environment variable (AWS_REGION) or  system property (aws.region).,
# software.amazon.awssdk.regions.providers.AwsProfileRegionProvider@3b59d246:
# No region provided in profile: default,
# software.amazon.awssdk.regions.providers.InstanceProfileRegionProvider@11b0cf30:
# Unable to contact EC2 metadata service.]
"org.janelia.saalfeldlab:n5-aws-s3" = ["org.janelia.saalfeldlab.n5.s3.AmazonS3UtilsTest"]

# Skip n5-universe slow tests.
"org.janelia.saalfeldlab:n5-universe" = [
  "org.janelia.saalfeldlab.n5.universe.storage.zarr.ZarrStorageTests",            # Time elapsed: 1753 s
  "org.janelia.saalfeldlab.n5.universe.storage.zarr.zarr2.Zarr2HttpFactoryTest",  # Time elapsed: 947.2 s
  "org.janelia.saalfeldlab.n5.universe.storage.n5.N5StorageTests",                # Time elapsed: 843.5 s
  "org.janelia.saalfeldlab.n5.universe.storage.n5.N5HttpFactoryTest",             # Time elapsed: 832.3 s
  "org.janelia.saalfeldlab.n5.universe.storage.zarr.zarr3.Zarr3HttpFactoryTest",  # Time elapsed: 785.5 s

  # And these are all dependent on the above removed classes. :-(
  "org.janelia.saalfeldlab.n5.universe.BackendStorageFormatTests",
  "org.janelia.saalfeldlab.n5.universe.storage.n5.N5AmazonS3FactoryTest",
  "org.janelia.saalfeldlab.n5.universe.storage.n5.N5FileSystemTest",
  "org.janelia.saalfeldlab.n5.universe.storage.n5.N5GoogleCloudFactoryTest",
  "org.janelia.saalfeldlab.n5.universe.storage.zarr.zarr2.Zarr2AmazonS3FactoryTest",
  "org.janelia.saalfeldlab.n5.universe.storage.zarr.zarr2.Zarr2FileSystemTest",
  "org.janelia.saalfeldlab.n5.universe.storage.zarr.zarr2.Zarr2GoogleCloudFactoryTest",
  "org.janelia.saalfeldlab.n5.universe.storage.zarr.zarr3.Zarr3AmazonS3FactoryTest",
  "org.janelia.saalfeldlab.n5.universe.storage.zarr.zarr3.Zarr3FileSystemTest",
  "org.janelia.saalfeldlab.n5.universe.storage.zarr.zarr3.Zarr3GoogleCloudFactoryTest",
]

"sc.fiji:labkit-ui" = [
    "sc.fiji.labkit.ui.GarbageCollectionTest",                                      # Too slow (7 s)
    "sc.fiji.labkit.ui.plugin.LabkitProbabilityMapForImagesInDirectoryPluginTest",  # Too slow (65 s)
    "sc.fiji.labkit.ui.plugin.SegmentRGBImageTest",                                 # Too slow (35 s)
    "sc.fiji.labkit.ui.segmentation.SegmentationToolTest",                          # Too slow (34 s)
]

