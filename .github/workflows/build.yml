name: build

on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master
  schedule:
    # Run weekly on Sunday to keep the Maven cache alive.
    - cron: '4 5 * * 0'

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      actions: write  # needed to delete and re-save the pombast cache

    steps:
      - uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          java-version: '11'
          java-package: 'jdk+fx'
          distribution: 'zulu'
          cache: 'maven'

      - uses: astral-sh/setup-uv@v6

      - uses: webfactory/ssh-agent@v0.9.0
        if: github.ref == 'refs/heads/master' && github.event_name == 'push'
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: Set up build environment
        run: .github/setup-build.sh
        shell: bash

      - name: Maven CI build
        run: .github/build.sh
        shell: bash
        env:
          GPG_KEY_NAME: ${{ secrets.GPG_KEY_NAME }}
          GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}
          MAVEN_USER: ${{ secrets.MAVEN_USER }}
          MAVEN_PASS: ${{ secrets.MAVEN_PASS }}
          CENTRAL_USER: ${{ secrets.CENTRAL_USER }}
          CENTRAL_PASS: ${{ secrets.CENTRAL_PASS }}
          SIGNING_ASC: ${{ secrets.SIGNING_ASC }}

      - name: Restore pombast cache
        uses: actions/cache/restore@v4
        with:
          path: ~/.cache/pombast
          key: ${{ runner.os }}-pombast-cache

      - name: Run pombast melt+smelt commands
        run: .github/melt.sh
        shell: bash

      - name: Delete old pombast cache
        if: always()
        run: |
          gh api --method DELETE \
            -H "Accept: application/vnd.github+json" \
            "/repos/scijava/pom-scijava/actions/caches?key=${{ runner.os }}-pombast-cache" || true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Save pombast cache
        if: always()
        uses: actions/cache/save@v4
        with:
          path: ~/.cache/pombast
          key: ${{ runner.os }}-pombast-cache

      - name: Publish smelt results
        if: always() && github.ref == 'refs/heads/master' && github.event_name == 'push'
        run: .github/publish.sh smelt.json "Update smelt results"
        shell: bash
